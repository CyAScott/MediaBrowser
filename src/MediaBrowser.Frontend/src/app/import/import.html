<div class="import-container">
  <div
    class="drop-zone"
    [class.drag-over]="isDragOver"
    [class.uploading]="isUploading"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">
    <p>Drag and drop a media file here</p>
    <label class="browse-btn" for="media-file-input">Browse Files</label>
    <input
      id="media-file-input"
      class="file-input"
      type="file"
      accept="video/*,audio/*,image/*"
      [disabled]="isUploading"
      (change)="onFileSelected($event)">
    @if (isUploading) {
      <p class="upload-state">Uploading file...</p>
    }
    @if (uploadError) {
      <p class="upload-error">{{ uploadError }}</p>
    }
  </div>

  @if (files.length > 0) {
    <div class="files-section">
      <table class="files-table">
        <thead>
          <tr>
            <th>File Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          @for (file of files; track $index) {
            <tr>
              <td class="filename">{{file.title}}</td>
              <td class="action">
                <a 
                  class="import-btn"
                  title="Import this file"
                  [routerLink]="['/import', file.title]"
                  [state]="{ mediaData: file }">
                  <i class="fa-solid fa-upload"></i>
                </a>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

  <!-- Empty state -->
  @if (files.length === 0) {
    <div class="empty-state">
      <p>No media files found in the selected directory.</p>
    </div>
  }
</div>
