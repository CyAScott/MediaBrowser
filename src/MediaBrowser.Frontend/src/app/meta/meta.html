<div class="meta-container">
  <div class="meta-header">
    <h2>{{ type }}</h2>
  </div>
  
  <div class="meta-content" #metaGrid>
    @if (!isLoading && metaMembers.length > 0) {
      <div class="meta-grid">
        @for (metaMember of metaMembers; track $index) {
          <a class="result-card" 
               [ngStyle]="{'backgroundImage':'url(' + metaMember.imageUrl + ')'}"
               [title]="metaMember.name"
               [routerLink]="'/search'"
               [queryParams]="metaMember.queryParams"
               (click)="clearPagePositionState()">
            <div class="card-overlay">
              <div class="meta-info">
                <div class="meta-name">{{ metaMember.name }}</div>
              </div>
            </div>
          </a>
        }
      </div>
    }
    
    <!-- Empty state -->
    @if (!isLoading && metaMembers.length === 0) {
      <div class="empty-state">
        <span>No {{ type }} members found</span>
      </div>
    }
  </div>
  
  <!-- Full screen spinner overlay -->
  <app-spinner [isLoading]="isLoading"></app-spinner>
</div>
