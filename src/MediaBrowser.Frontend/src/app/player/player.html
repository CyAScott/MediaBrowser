<div class="player-container">
  <div class="player-header" 
    *ngIf="mediaData"
    [class.fade-out]="!headerVisible"
    (mousemove)="onMouseMove()"
    (mouseleave)="onMouseLeave()">
    <button class="back-button" *ngIf="hasHistory" (click)="goBack()">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h2>{{ mediaData.title }}</h2>
    <button class="edit-button" (click)="editMedia()">
      <i class="fa-solid fa-pencil"></i>
    </button>
  </div>
  
  <div class="player">
    <video controls autoplay 
      *ngIf="mediaData && mediaData.mime.startsWith('video/')"
      [poster]="mediaData.thumbnailUrl"
      class="video-element">
      <source [src]="mediaData.url" type="{{ mediaData.mime }}">
      Your browser does not support the video tag.
    </video>

    <audio controls autoplay 
      [ngStyle]="{'backgroundImage':'url(' + mediaData.thumbnailUrl + ')'}"
      *ngIf="mediaData && mediaData.mime.startsWith('audio/')"
      class="audio-element">
      <source [src]="mediaData.url" type="{{ mediaData.mime }}">
      Your browser does not support the audio element.
    </audio>

    <img 
      *ngIf="mediaData && mediaData.mime.startsWith('image/')"
      [src]="mediaData.url"
      alt="{{ mediaData.title }}"
      class="image-element" />
  </div>
  
  <div class="no-media" *ngIf="!mediaData">
    <p>No media data available</p>
    <button (click)="goBack()">Return to Search</button>
  </div>
</div>
