<div class="player-container">
  <div class="player-header" 
    *ngIf="mediaData"
    [class.fade-out]="!headerVisible"
    (mousemove)="onMouseMove()"
    (mouseleave)="onMouseLeave()">
    <button class="back-button" *ngIf="hasHistory" (click)="goBack()">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h2>{{ mediaData.title }}</h2>
    <button class="edit-button" (click)="editMedia()">
      <i class="fa-solid fa-pencil"></i>
    </button>
  </div>
  
  <div class="video-player" *ngIf="mediaData">
    <video controls autoplay [poster]="mediaData.fanartUrl" class="video-element">
      <source [src]="mediaData.url" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
  
  <div class="no-media" *ngIf="!mediaData">
    <p>No media data available</p>
    <button (click)="goBack()">Return to Search</button>
  </div>
</div>
