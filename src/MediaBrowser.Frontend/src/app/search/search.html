<div class="search-container">
  <div class="search-header">
    <div class="search-form">
      <input 
        (input)="onKeywordsChange()" 
        (keydown.enter)="onSearch()" 
        [(ngModel)]="keywords" 
        class="search-input" 
        placeholder="Search for media files..." 
        type="text" />
      
      <button 
        (click)="toggleSortDirection()" 
        [title]="descending ? 'Sort Ascending' : 'Sort Descending'"
        class="sort-direction-button">
        <i class="fa-solid" [class.fa-arrow-up-wide-short]="descending" [class.fa-arrow-up-short-wide]="!descending"></i>
      </button>
      
      <select 
        (change)="onSortChange()" 
        [(ngModel)]="sort" 
        class="sort-dropdown">
        @for (option of sortOptions; track option.value) {
          <option [value]="option.value">
            {{ option.label }}
          </option>
        }
      </select>
      
      <div class="sort-filter-container">
        <button 
          (click)="toggleSortOptions()" 
          [title]="'Sort Options'" 
          class="sort-filter-button">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
        
        <!-- Sort options modal -->
        @if (showSortModal) {
          <div 
            (click)="closeSortModal()" 
            class="sort-modal">
          <div (click)="$event.stopPropagation()" class="sort-modal-content">
            <div class="sort-modal-header">
              <span>Sort by</span>
              <button (click)="closeSortModal()" class="sort-modal-close">
                <i class="fa-solid fa-times"></i>
              </button>
            </div>
            <div class="sort-modal-options">
              @for (option of sortOptions; track option.value) {
                <button 
                  (click)="selectSortOption(option.value)"
                  [class.selected]="option.value === sort"
                  class="sort-option">
                  <span class="sort-option-label">{{ option.label }}</span>
                  @if (option.value === sort) {
                    <i class="fa-solid fa-check sort-option-check"></i>
                  }
                </button>
              }
            </div>
          </div>
          </div>
        }
      </div>
      
      <button (click)="onSearch()" [disabled]="isLoading" class="search-button">
        {{ isLoading ? 'Searching...' : 'Search' }}
      </button>
    </div>
  </div>
  
  <app-search-content
    (cardClick)="onCardClick()" 
    (scroll)="onScroll($event)"
    [hasMoreResults]="hasMoreResults"
    [isLoading]="isLoading"
    [results]="results"
    #searchContent>
  </app-search-content>
</div>
